[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
